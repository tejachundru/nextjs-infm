services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nextjs-perf-db
    restart: unless-stopped
    ports:
      - '5433:5432' # Port externe 5433 pour éviter conflit
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nextjs_perf_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (optional - UI pour gérer la DB)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nextjs-perf-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  # Database Initialization (migrations + seed)
  # Usage: docker-compose --profile init up
  db-init:
    build:
      context: ./server
      dockerfile: Dockerfile.init
    container_name: nextjs-perf-db-init
    profiles: ['init']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nextjs_perf_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nextjs_perf_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
